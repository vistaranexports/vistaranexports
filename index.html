<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script type="text/javascript">
      // Convert redirected GitHub Pages URLs back into proper SPA routes.
      (function () {
        var redirect = window.location.search;
        if (redirect.startsWith('?/')) {
          var decoded = redirect
            .slice(2)
            .split('&')
            .map(function (segment) {
              return segment.replace(/~and~/g, '&');
            })
            .join('?');

          window.history.replaceState(null, null, window.location.pathname + decoded + window.location.hash);
        }
      })();
    </script>
    <title>vistaran-exports</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
